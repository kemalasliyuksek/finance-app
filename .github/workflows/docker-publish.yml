name: Docker Publish

# main'e her push'ta iki image'ı (bot + dashboard) ghcr.io'ya build ve push eder.
# Watchtower bu image'ları sunucuda otomatik pull ederek container'ları günceller.
# Manuel tetikleme için workflow_dispatch de aktiftir.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "config-presets/**"
      - "docs/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  # Haziran 2026'dan sonra Node 20 destekten kalkıyor, şimdiden Node 24'e geç
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bot
            context: .
            dockerfile: Dockerfile
            image: finance-app-bot
          - name: dashboard
            context: ./dashboard
            dockerfile: dashboard/Dockerfile
            image: finance-app-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
